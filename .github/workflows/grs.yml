name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DEFAULT_THEME: theme=onedark&bg_color=00000000&hide_border=true
      BASE_PIN_CARD_OPTIONS: username=${{ github.repository_owner }}&description_lines_count=3

    steps:       
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&${{ env.DEFAULT_THEME }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&${{ env.DEFAULT_THEME }}&show_icons=true&layout=compact&hide=html,css,cmake,php&size_weight=0.5&count_weight=0.5&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sandbox pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=sandbox
          path: profile/pin-sandbox-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate charlene pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=charlene
          path: profile/pin-charlene-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tp pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=tp
          path: profile/pin-tp-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate skelly pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=skelly
          path: profile/pin-skelly-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dotfiles pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=dotfiles
          path: profile/pin-dotfiles-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate scripts pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: ${{ env.BASE_PIN_CARD_OPTIONS }}&${{ env.DEFAULT_THEME }}&repo=scripts
          path: profile/pin-scripts-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
